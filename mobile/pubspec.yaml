name: closetai_mobile
description: "ClosetAI — Tu asesor de moda personal con IA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase (Auth + Storage) ─────────────────────────────────
  supabase_flutter: ^2.8.4

  # ── HTTP / API ────────────────────────────────────────────────
  http: ^1.2.2
  http_parser: ^4.0.2

  # ── Cámara y galería ──────────────────────────────────────────
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # ── Imágenes en red (con caché)  ──────────────────────────────
  cached_network_image: ^3.4.1

  # ── UI / Animaciones ──────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # ── Storage local ─────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── Íconos extra ─────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

  # ── Utils ─────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
